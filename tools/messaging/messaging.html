<!-- ────────────────────────────────────────────────────────────────────────────
     MESSAGING HOUSE — Multi-house Supabase-backed tool (v2)
     ──────────────────────────────────────────────────────────────────────────── -->

<style>
.mh-tool { width: 100%; height: 100%; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }

/* ── Top Bar ── */
.mh-topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; background: var(--white); border-bottom: 1px solid var(--gray-200); flex-shrink: 0; gap: 1rem; }
.mh-topbar-left { display: flex; align-items: center; gap: 0.75rem; }
.mh-topbar h2 { font-size: 1.25rem; font-weight: 700; color: var(--navy); margin: 0; }
.mh-topbar-actions { display: flex; gap: 0.5rem; align-items: center; }

/* ── Buttons ── */
.mh-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.55rem 1rem; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
.mh-btn-primary { background: var(--pink); color: white; }
.mh-btn-primary:hover { background: var(--pink-hover); }
.mh-btn-secondary { background: var(--white); color: var(--gray-700); border: 1px solid var(--gray-200); }
.mh-btn-secondary:hover { border-color: var(--pink); color: var(--pink); }
.mh-btn-ghost { background: none; color: var(--gray-500); border: none; padding: 0.4rem 0.6rem; }
.mh-btn-ghost:hover { color: var(--pink); }
.mh-btn-sm { padding: 0.35rem 0.7rem; font-size: 0.75rem; }
.mh-btn-danger { background: none; color: var(--error); border: 1px solid var(--error); }
.mh-btn-danger:hover { background: var(--error); color: white; }
.mh-btn-success { background: rgba(5,150,105,0.1); color: #059669; border: 1px solid rgba(5,150,105,0.2); }
.mh-btn-success:hover { background: #059669; color: white; }

/* ── Scrollable body ── */
.mh-body { flex: 1; overflow-y: auto; padding: 1.5rem; }

/* ── List View ── */
.mh-list { display: flex; flex-direction: column; gap: 0.75rem; max-width: 720px; }
.mh-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: all 0.15s; }
.mh-card:hover { border-color: var(--pink); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.mh-card-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(208,32,144,0.08); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.mh-card-body { flex: 1; min-width: 0; }
.mh-card-title { font-size: 0.95rem; font-weight: 600; color: var(--navy); margin-bottom: 2px; }
.mh-card-meta { font-size: 0.75rem; color: var(--gray-500); display: flex; gap: 1rem; align-items: center; }
.mh-badge { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.15rem 0.5rem; border-radius: 4px; }
.mh-badge-draft { background: var(--gray-100); color: var(--gray-500); }
.mh-badge-active { background: rgba(16,185,129,0.1); color: #059669; }
.mh-badge-archived { background: rgba(239,68,68,0.08); color: var(--error); }
.mh-card-arrow { color: var(--gray-300); font-size: 1.2rem; }

.mh-empty { text-align: center; padding: 3rem 1rem; color: var(--gray-500); }
.mh-empty p { margin-bottom: 1rem; font-size: 0.9rem; }

/* ── Editor ── */
.mh-editor { max-width: 780px; }
.mh-meta-bar { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; }
.mh-meta-row { display: flex; gap: 1rem; margin-bottom: 0.75rem; }
.mh-meta-row:last-child { margin-bottom: 0; }
.mh-meta-row > .mh-field { flex: 1; }

/* ── Form fields ── */
.mh-field { margin-bottom: 1rem; }
.mh-field:last-child { margin-bottom: 0; }
.mh-label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gray-500); margin-bottom: 0.4rem; }
.mh-input, .mh-textarea, .mh-select { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 0.85rem; font-family: inherit; color: var(--gray-700); background: var(--white); transition: border-color 0.15s; box-sizing: border-box; }
.mh-input:focus, .mh-textarea:focus, .mh-select:focus { outline: none; border-color: var(--pink); }
.mh-textarea { min-height: 80px; resize: vertical; }
.mh-hint { font-size: 0.7rem; color: var(--gray-400); margin-top: 0.25rem; }

/* ── Section cards ── */
.mh-section { background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px; margin-bottom: 1rem; overflow: hidden; }
.mh-section-header { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1.25rem; cursor: pointer; user-select: none; }
.mh-section-header:hover { background: var(--gray-50); }
.mh-section-left { display: flex; align-items: center; gap: 0.5rem; }
.mh-section-title { font-size: 0.85rem; font-weight: 700; color: var(--navy); }
.mh-section-badge { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 4px; }
.mh-badge-core { background: rgba(5,150,105,0.1); color: #059669; }
.mh-badge-optional { background: rgba(217,43,150,0.08); color: var(--pink); }
.mh-section-chevron { color: var(--gray-400); transition: transform 0.2s; font-size: 0.85rem; }
.mh-section.open .mh-section-chevron { transform: rotate(180deg); }
.mh-section-body { display: none; padding: 1.25rem; border-top: 1px solid var(--gray-100); }
.mh-section.open .mh-section-body { display: block; }

/* ── Tagline rows ── */
.mh-tagline-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
.mh-tagline-row input { flex: 1; }
.mh-tagline-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--gray-400); min-width: 70px; }
.mh-tagline-remove { background: none; border: none; color: var(--gray-300); cursor: pointer; font-size: 1rem; padding: 0.2rem; }
.mh-tagline-remove:hover { color: var(--error); }

/* ── Elevator toggles ── */
.mh-elevator-item { margin-bottom: 1rem; }
.mh-elevator-toggle { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; cursor: pointer; }
.mh-elevator-toggle input[type="checkbox"] { accent-color: var(--pink); }
.mh-elevator-toggle label { font-size: 0.8rem; font-weight: 600; color: var(--gray-600); cursor: pointer; }

/* ── Pillars ── */
.mh-pillar { background: var(--gray-50); border: 1px solid var(--gray-100); border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem; }
.mh-pillar-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
.mh-pillar-num { width: 24px; height: 24px; border-radius: 6px; background: var(--pink); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
.mh-pillar-header input { flex: 1; }
.mh-pillar-remove { background: none; border: none; color: var(--gray-300); cursor: pointer; font-size: 1rem; padding: 0.2rem; }
.mh-pillar-remove:hover { color: var(--error); }

/* ── Lead with / Avoid chips ── */
.mh-chip-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; }
.mh-chip { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.3rem 0.6rem; background: var(--gray-100); border-radius: 6px; font-size: 0.78rem; color: var(--gray-700); }
.mh-chip-remove { background: none; border: none; color: var(--gray-400); cursor: pointer; font-size: 0.8rem; padding: 0; line-height: 1; }
.mh-chip-remove:hover { color: var(--error); }
.mh-chip-input-row { display: flex; gap: 0.4rem; }
.mh-chip-input-row input { flex: 1; }

/* ── Proof assets ── */
.mh-proof-item { display: flex; gap: 0.5rem; align-items: start; margin-bottom: 0.5rem; padding: 0.75rem; background: var(--gray-50); border-radius: 8px; border: 1px solid var(--gray-100); }
.mh-proof-item .mh-field { flex: 1; margin-bottom: 0; }
.mh-proof-remove { background: none; border: none; color: var(--gray-300); cursor: pointer; font-size: 1rem; padding: 0.2rem; margin-top: 1.2rem; }
.mh-proof-remove:hover { color: var(--error); }

/* ── Status bar ── */
.mh-status-bar { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1.5rem; background: var(--white); border-top: 1px solid var(--gray-200); flex-shrink: 0; }
.mh-status-text { flex: 1; font-size: 0.8rem; color: var(--gray-500); }
.mh-status-text strong { color: var(--navy); }

/* ── Responsive ── */
@media (max-width: 640px) {
  .mh-meta-row { flex-direction: column; gap: 0; }
  .mh-topbar { padding: 0.75rem 1rem; }
  .mh-body { padding: 1rem; }
}
</style>

<div class="mh-tool" id="mhTool">
  <!-- LIST VIEW -->
  <div id="mh-view-list">
    <div class="mh-topbar">
      <div class="mh-topbar-left">
        <h2>Messaging Houses</h2>
      </div>
      <div class="mh-topbar-actions">
        <button class="mh-btn mh-btn-primary" onclick="mhCreate()">+ New Messaging House</button>
      </div>
    </div>
    <div class="mh-body">
      <div class="mh-list" id="mh-house-list"></div>
    </div>
  </div>

  <!-- EDITOR VIEW -->
  <div id="mh-view-editor" style="display:none;">
    <div class="mh-topbar">
      <div class="mh-topbar-left">
        <button class="mh-btn mh-btn-ghost" onclick="mhBackToList()">← Back</button>
        <h2 id="mh-editor-title">Messaging House</h2>
      </div>
      <div class="mh-topbar-actions">
        <select id="mh-status-select" class="mh-select" style="width:auto;padding:0.4rem 0.6rem;font-size:0.75rem;" onchange="mhUpdateStatus(this.value)">
          <option value="draft">Draft</option>
          <option value="active">Active</option>
          <option value="archived">Archived</option>
        </select>
        <button class="mh-btn mh-btn-danger mh-btn-sm" onclick="mhDelete()">Delete</button>
      </div>
    </div>
    <div class="mh-body">
      <div class="mh-editor" id="mh-editor"></div>
    </div>
    <div class="mh-status-bar">
      <span class="mh-status-text" id="mh-save-status">Ready</span>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  /* ══════════════════════════════════════════════════════════════════════════
     STATE
     ══════════════════════════════════════════════════════════════════════════ */
  let mhCurrentId = null;
  let mhData = null;
  let mhSaveTimer = null;
  const MH_TYPES = { company: 'Company', product: 'Product', campaign: 'Campaign', event: 'Event', segment: 'Segment', other: 'Other' };
  const MH_TYPE_ICONS = { company: '🏢', product: '📦', campaign: '📣', event: '🎯', segment: '👥', other: '📋' };

  /* ══════════════════════════════════════════════════════════════════════════
     SUPABASE HELPERS
     ══════════════════════════════════════════════════════════════════════════ */
  function sb() { return Auth.getClient(); }

  async function mhFetchAll() {
    const clientId = Storage.getActiveClientId();
    if (!clientId) return [];
    const { data, error } = await sb().from('messaging_houses').select('*').eq('client_id', clientId).order('updated_at', { ascending: false });
    if (error) { console.error('mhFetchAll error:', error); return []; }
    return data || [];
  }

  async function mhFetchOne(id) {
    const { data, error } = await sb().from('messaging_houses').select('*').eq('id', id).single();
    if (error) { console.error('mhFetchOne error:', error); return null; }
    return data;
  }

  async function mhInsert(house) {
    const clientId = Storage.getActiveClientId();
    const row = { client_id: clientId, ...house };
    const { data, error } = await sb().from('messaging_houses').insert(row).select().single();
    if (error) { console.error('mhInsert error:', error); return null; }
    return data;
  }

  async function mhUpdate(id, updates) {
    updates.updated_at = new Date().toISOString();
    const { data, error } = await sb().from('messaging_houses').update(updates).eq('id', id).select().single();
    if (error) { console.error('mhUpdate error:', error); return null; }
    return data;
  }

  async function mhDeleteRow(id) {
    const { error } = await sb().from('messaging_houses').delete().eq('id', id);
    if (error) { console.error('mhDelete error:', error); return false; }
    return true;
  }

  /* ══════════════════════════════════════════════════════════════════════════
     LIST VIEW
     ══════════════════════════════════════════════════════════════════════════ */
  window.mhInit = async function() {
    document.getElementById('mh-view-list').style.display = '';
    document.getElementById('mh-view-editor').style.display = 'none';
    mhCurrentId = null;
    mhData = null;
    await mhRenderList();
  };

  async function mhRenderList() {
    const list = document.getElementById('mh-house-list');
    list.innerHTML = '<p style="color:var(--gray-400);font-size:0.85rem;">Loading...</p>';
    const houses = await mhFetchAll();
    if (!houses.length) {
      list.innerHTML = `
        <div class="mh-empty">
          <p>No messaging houses yet for this client.</p>
          <button class="mh-btn mh-btn-primary" onclick="mhCreate()">+ Create First Messaging House</button>
        </div>`;
      return;
    }
    list.innerHTML = houses.map(h => {
      const icon = MH_TYPE_ICONS[h.type] || '📋';
      const typeName = MH_TYPES[h.type] || h.type;
      const badgeClass = h.status === 'active' ? 'mh-badge-active' : h.status === 'archived' ? 'mh-badge-archived' : 'mh-badge-draft';
      const tagline = (h.taglines && h.taglines[0] && h.taglines[0].text) ? h.taglines[0].text : '';
      const meta = [typeName, tagline].filter(Boolean).join(' · ');
      return `
        <div class="mh-card" onclick="mhOpenEditor('${h.id}')">
          <div class="mh-card-icon">${icon}</div>
          <div class="mh-card-body">
            <div class="mh-card-title">${esc(h.title)}</div>
            <div class="mh-card-meta">
              <span class="mh-badge ${badgeClass}">${h.status}</span>
              <span>${esc(meta)}</span>
            </div>
          </div>
          <div class="mh-card-arrow">›</div>
        </div>`;
    }).join('');
  }

  /* ══════════════════════════════════════════════════════════════════════════
     CREATE / OPEN / DELETE
     ══════════════════════════════════════════════════════════════════════════ */
  window.mhCreate = async function() {
    const house = await mhInsert({
      title: 'Untitled Messaging House',
      type: 'company',
      taglines: [{ label: 'Primary', text: '' }],
      elevator: { '25_word': { enabled: true, text: '' }, '50_word': { enabled: false, text: '' }, '100_word': { enabled: false, text: '' } },
      positioning: { target_audience: '', problem: '', solution: '', differentiator: '', value: '' },
      pillars: [],
      lead_with: [],
      avoid: [],
      purpose_vision: { purpose: '', vision: '' },
      proof_assets: [],
      enabled_sections: { taglines: true, context: true, elevator: true, outcome: true, positioning: true, pillars: true, lead_avoid: false, purpose_vision: false, proof_assets: false }
    });
    if (house) {
      await mhOpenEditor(house.id);
    }
  };

  window.mhOpenEditor = async function(id) {
    mhCurrentId = id;
    mhData = await mhFetchOne(id);
    if (!mhData) { alert('Could not load messaging house.'); return; }
    document.getElementById('mh-view-list').style.display = 'none';
    document.getElementById('mh-view-editor').style.display = '';
    document.getElementById('mh-editor-title').textContent = mhData.title || 'Messaging House';
    document.getElementById('mh-status-select').value = mhData.status || 'draft';
    mhRenderEditor();
  };

  window.mhBackToList = function() {
    if (mhSaveTimer) { clearTimeout(mhSaveTimer); mhSaveTimer = null; mhSaveNow(); }
    mhInit();
  };

  window.mhDelete = async function() {
    if (!confirm('Delete this messaging house? This cannot be undone.')) return;
    await mhDeleteRow(mhCurrentId);
    mhInit();
  };

  window.mhUpdateStatus = function(val) {
    mhData.status = val;
    mhScheduleSave();
  };

  /* ══════════════════════════════════════════════════════════════════════════
     AUTO-SAVE
     ══════════════════════════════════════════════════════════════════════════ */
  function mhScheduleSave() {
    document.getElementById('mh-save-status').innerHTML = 'Unsaved changes...';
    if (mhSaveTimer) clearTimeout(mhSaveTimer);
    mhSaveTimer = setTimeout(mhSaveNow, 1200);
  }

  async function mhSaveNow() {
    if (!mhCurrentId || !mhData) return;
    mhSaveTimer = null;
    document.getElementById('mh-save-status').innerHTML = 'Saving...';
    const { id, client_id, created_at, updated_at, ...updates } = mhData;
    const result = await mhUpdate(mhCurrentId, updates);
    if (result) {
      document.getElementById('mh-save-status').innerHTML = 'Saved <strong>' + new Date().toLocaleTimeString() + '</strong>';
      document.getElementById('mh-editor-title').textContent = mhData.title || 'Messaging House';
    } else {
      document.getElementById('mh-save-status').innerHTML = '<span style="color:var(--error)">Save failed — check console</span>';
    }
  }

  /* ══════════════════════════════════════════════════════════════════════════
     EDITOR RENDERER
     ══════════════════════════════════════════════════════════════════════════ */
  function mhRenderEditor() {
    const ed = document.getElementById('mh-editor');
    const d = mhData;
    const sec = d.enabled_sections || {};

    let html = '';

    // ── Meta bar ──
    html += `<div class="mh-meta-bar">
      <div class="mh-meta-row">
        <div class="mh-field">
          <label class="mh-label">Title</label>
          <input class="mh-input" value="${esc(d.title)}" onchange="mhSet('title',this.value)" placeholder="e.g. Acme Corp Messaging House">
        </div>
        <div class="mh-field" style="max-width:180px;">
          <label class="mh-label">Type</label>
          <select class="mh-select" onchange="mhSet('type',this.value)">
            ${Object.entries(MH_TYPES).map(([k,v]) => `<option value="${k}" ${d.type===k?'selected':''}>${v}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="mh-meta-row">
        <div class="mh-field">
          <label class="mh-label">Description</label>
          <input class="mh-input" value="${esc(d.description||'')}" onchange="mhSet('description',this.value)" placeholder="Brief description of what this messaging house covers">
        </div>
      </div>
    </div>`;

    // ── Sections ──
    html += mhRenderTaglines(d, sec);
    html += mhRenderContext(d, sec);
    html += mhRenderElevator(d, sec);
    html += mhRenderOutcome(d, sec);
    html += mhRenderPositioning(d, sec);
    html += mhRenderPillars(d, sec);
    html += mhRenderLeadAvoid(d, sec);
    html += mhRenderPurposeVision(d, sec);
    html += mhRenderProofAssets(d, sec);

    // ── Optional section toggles ──
    html += `<div style="margin-top:1.5rem; padding:1rem; background:var(--white); border:1px solid var(--gray-200); border-radius:12px;">
      <div class="mh-label" style="margin-bottom:0.75rem;">Show / Hide Sections</div>
      ${mhToggle('lead_avoid', 'Lead With & Avoid', sec)}
      ${mhToggle('purpose_vision', 'Purpose & Vision', sec)}
      ${mhToggle('proof_assets', 'Proof Point Assets', sec)}
    </div>`;

    ed.innerHTML = html;
  }

  function mhToggle(key, label, sec) {
    const checked = sec[key] ? 'checked' : '';
    return `<label style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem;cursor:pointer;font-size:0.82rem;color:var(--gray-600);">
      <input type="checkbox" ${checked} onchange="mhToggleSection('${key}',this.checked)" style="accent-color:var(--pink);">
      ${label}
    </label>`;
  }

  /* ── Section: Taglines ── */
  function mhRenderTaglines(d, sec) {
    if (!sec.taglines) return '';
    const taglines = d.taglines || [];
    let inner = '';
    taglines.forEach((t, i) => {
      const removable = i > 0;
      inner += `<div class="mh-tagline-row">
        <span class="mh-tagline-label">${esc(t.label || ('Tagline ' + (i+1)))}</span>
        <input class="mh-input" value="${esc(t.text||'')}" onchange="mhSetTagline(${i},'text',this.value)" placeholder="Enter tagline...">
        ${removable ? `<button class="mh-tagline-remove" onclick="mhRemoveTagline(${i})">✕</button>` : ''}
      </div>`;
    });
    inner += `<button class="mh-btn mh-btn-secondary mh-btn-sm" onclick="mhAddTagline()" style="margin-top:0.25rem;">+ Add Tagline</button>`;
    return mhSection('taglines', 'Taglines', 'core', inner, true);
  }

  /* ── Section: Context / Why ── */
  function mhRenderContext(d, sec) {
    if (!sec.context) return '';
    const inner = `<div class="mh-field">
      <label class="mh-label">Context / Why Now</label>
      <textarea class="mh-textarea" onchange="mhSet('context',this.value)" placeholder="What market conditions, trends, or customer needs make this messaging relevant right now?">${esc(d.context||'')}</textarea>
      <div class="mh-hint">The background that grounds all messaging in this house.</div>
    </div>`;
    return mhSection('context', 'Context / Why Now', 'core', inner);
  }

  /* ── Section: Elevator Pitch ── */
  function mhRenderElevator(d, sec) {
    if (!sec.elevator) return '';
    const elev = d.elevator || {};
    const lengths = [
      { key: '25_word', label: '25-word (Tweet-length)' },
      { key: '50_word', label: '50-word (Conversation)' },
      { key: '100_word', label: '100-word (Full pitch)' }
    ];
    let inner = '';
    lengths.forEach(l => {
      const item = elev[l.key] || { enabled: false, text: '' };
      inner += `<div class="mh-elevator-item">
        <div class="mh-elevator-toggle">
          <input type="checkbox" id="elev-${l.key}" ${item.enabled?'checked':''} onchange="mhSetElevator('${l.key}','enabled',this.checked)">
          <label for="elev-${l.key}">${l.label}</label>
        </div>
        ${item.enabled ? `<textarea class="mh-textarea" style="min-height:60px;" onchange="mhSetElevator('${l.key}','text',this.value)" placeholder="Write the ${l.label.toLowerCase()} elevator pitch...">${esc(item.text||'')}</textarea>` : ''}
      </div>`;
    });
    return mhSection('elevator', 'Elevator Pitch', 'core', inner);
  }

  /* ── Section: Outcome ── */
  function mhRenderOutcome(d, sec) {
    if (!sec.outcome) return '';
    const inner = `<div class="mh-field">
      <label class="mh-label">Core Outcome / Promise</label>
      <textarea class="mh-textarea" onchange="mhSet('outcome',this.value)" placeholder="What is the single most important outcome or promise you deliver?">${esc(d.outcome||'')}</textarea>
      <div class="mh-hint">The ultimate value your audience gets — their reason to care.</div>
    </div>`;
    return mhSection('outcome', 'Core Outcome', 'core', inner);
  }

  /* ── Section: Positioning ── */
  function mhRenderPositioning(d, sec) {
    if (!sec.positioning) return '';
    const p = d.positioning || {};
    const fields = [
      { key: 'target_audience', label: 'Target Audience', placeholder: 'Who is this for? Be specific.' },
      { key: 'problem', label: 'Problem', placeholder: 'What problem or unmet need do they face?' },
      { key: 'solution', label: 'Solution', placeholder: 'How does your offering solve this problem?' },
      { key: 'differentiator', label: 'Differentiator', placeholder: 'What makes you uniquely qualified / different?' },
      { key: 'value', label: 'Value', placeholder: 'What is the measurable or emotional value delivered?' }
    ];
    let inner = '';
    fields.forEach(f => {
      inner += `<div class="mh-field">
        <label class="mh-label">${f.label}</label>
        <textarea class="mh-textarea" style="min-height:60px;" onchange="mhSetPositioning('${f.key}',this.value)" placeholder="${f.placeholder}">${esc(p[f.key]||'')}</textarea>
      </div>`;
    });
    return mhSection('positioning', 'Positioning Framework', 'core', inner);
  }

  /* ── Section: Pillars ── */
  function mhRenderPillars(d, sec) {
    if (!sec.pillars) return '';
    const pillars = d.pillars || [];
    let inner = '';
    pillars.forEach((p, i) => {
      inner += `<div class="mh-pillar">
        <div class="mh-pillar-header">
          <span class="mh-pillar-num">${i+1}</span>
          <input class="mh-input" value="${esc(p.name||'')}" onchange="mhSetPillar(${i},'name',this.value)" placeholder="Pillar name">
          <button class="mh-pillar-remove" onclick="mhRemovePillar(${i})">✕</button>
        </div>
        <div class="mh-field" style="margin-bottom:0;">
          <textarea class="mh-textarea" style="min-height:60px;" onchange="mhSetPillar(${i},'description',this.value)" placeholder="Describe this messaging pillar and its key themes...">${esc(p.description||'')}</textarea>
        </div>
      </div>`;
    });
    inner += `<button class="mh-btn mh-btn-secondary mh-btn-sm" onclick="mhAddPillar()">+ Add Pillar</button>`;
    return mhSection('pillars', 'Messaging Pillars', 'core', inner);
  }

  /* ── Section: Lead With / Avoid ── */
  function mhRenderLeadAvoid(d, sec) {
    if (!sec.lead_avoid) return '';
    let inner = '';
    inner += `<div class="mh-field">
      <label class="mh-label">Lead With</label>
      <div class="mh-hint" style="margin-bottom:0.5rem;">Words, phrases, and themes to emphasise.</div>
      <div class="mh-chip-list" id="mh-lead-chips">
        ${(d.lead_with||[]).map((w,i) => `<span class="mh-chip">${esc(w)} <button class="mh-chip-remove" onclick="mhRemoveChip('lead_with',${i})">✕</button></span>`).join('')}
      </div>
      <div class="mh-chip-input-row">
        <input class="mh-input" id="mh-lead-input" placeholder="Type and press Enter..." onkeydown="if(event.key==='Enter'){event.preventDefault();mhAddChip('lead_with','mh-lead-input');}">
        <button class="mh-btn mh-btn-secondary mh-btn-sm" onclick="mhAddChip('lead_with','mh-lead-input')">Add</button>
      </div>
    </div>`;
    inner += `<div class="mh-field" style="margin-top:1rem;">
      <label class="mh-label">Avoid</label>
      <div class="mh-hint" style="margin-bottom:0.5rem;">Words, phrases, and themes to steer away from.</div>
      <div class="mh-chip-list" id="mh-avoid-chips">
        ${(d.avoid||[]).map((w,i) => `<span class="mh-chip">${esc(w)} <button class="mh-chip-remove" onclick="mhRemoveChip('avoid',${i})">✕</button></span>`).join('')}
      </div>
      <div class="mh-chip-input-row">
        <input class="mh-input" id="mh-avoid-input" placeholder="Type and press Enter..." onkeydown="if(event.key==='Enter'){event.preventDefault();mhAddChip('avoid','mh-avoid-input');}">
        <button class="mh-btn mh-btn-secondary mh-btn-sm" onclick="mhAddChip('avoid','mh-avoid-input')">Add</button>
      </div>
    </div>`;
    return mhSection('lead_avoid', 'Lead With & Avoid', 'optional', inner);
  }

  /* ── Section: Purpose & Vision ── */
  function mhRenderPurposeVision(d, sec) {
    if (!sec.purpose_vision) return '';
    const pv = d.purpose_vision || {};
    const inner = `<div class="mh-field">
      <label class="mh-label">Purpose</label>
      <textarea class="mh-textarea" style="min-height:60px;" onchange="mhSetPV('purpose',this.value)" placeholder="Why does your company/product exist? What change do you want to make in the world?">${esc(pv.purpose||'')}</textarea>
    </div>
    <div class="mh-field">
      <label class="mh-label">Vision</label>
      <textarea class="mh-textarea" style="min-height:60px;" onchange="mhSetPV('vision',this.value)" placeholder="What does the future look like when you succeed?">${esc(pv.vision||'')}</textarea>
    </div>`;
    return mhSection('purpose_vision', 'Purpose & Vision', 'optional', inner);
  }

  /* ── Section: Proof Point Assets ── */
  function mhRenderProofAssets(d, sec) {
    if (!sec.proof_assets) return '';
    const assets = d.proof_assets || [];
    let inner = '';
    assets.forEach((a, i) => {
      inner += `<div class="mh-proof-item">
        <div class="mh-field">
          <label class="mh-label">Type</label>
          <select class="mh-select" onchange="mhSetProof(${i},'type',this.value)">
            <option value="stat" ${a.type==='stat'?'selected':''}>Statistic</option>
            <option value="quote" ${a.type==='quote'?'selected':''}>Quote / Testimonial</option>
            <option value="case_study" ${a.type==='case_study'?'selected':''}>Case Study</option>
            <option value="award" ${a.type==='award'?'selected':''}>Award / Recognition</option>
            <option value="other" ${a.type==='other'?'selected':''}>Other</option>
          </select>
        </div>
        <div class="mh-field" style="flex:2;">
          <label class="mh-label">Description</label>
          <input class="mh-input" value="${esc(a.text||'')}" onchange="mhSetProof(${i},'text',this.value)" placeholder="e.g. 98% customer satisfaction rate">
        </div>
        <button class="mh-proof-remove" onclick="mhRemoveProof(${i})">✕</button>
      </div>`;
    });
    inner += `<button class="mh-btn mh-btn-secondary mh-btn-sm" onclick="mhAddProof()">+ Add Proof Point</button>`;
    return mhSection('proof_assets', 'Proof Point Assets', 'optional', inner);
  }

  /* ── Section wrapper ── */
  function mhSection(key, title, type, inner, startOpen) {
    const openClass = startOpen ? ' open' : '';
    const badgeClass = type === 'core' ? 'mh-badge-core' : 'mh-badge-optional';
    return `<div class="mh-section${openClass}" id="mh-sec-${key}">
      <div class="mh-section-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="mh-section-left">
          <span class="mh-section-title">${title}</span>
          <span class="mh-section-badge ${badgeClass}">${type}</span>
        </div>
        <span class="mh-section-chevron">▾</span>
      </div>
      <div class="mh-section-body">${inner}</div>
    </div>`;
  }

  /* ══════════════════════════════════════════════════════════════════════════
     DATA SETTERS (mutate mhData + schedule save)
     ══════════════════════════════════════════════════════════════════════════ */
  window.mhSet = function(key, val) {
    mhData[key] = val;
    mhScheduleSave();
  };

  window.mhToggleSection = function(key, enabled) {
    if (!mhData.enabled_sections) mhData.enabled_sections = {};
    mhData.enabled_sections[key] = enabled;
    mhScheduleSave();
    mhRenderEditor();
  };

  // Taglines
  window.mhSetTagline = function(i, field, val) {
    mhData.taglines[i][field] = val;
    mhScheduleSave();
  };
  window.mhAddTagline = function() {
    const labels = ['Primary', 'Secondary', 'Tertiary'];
    const idx = mhData.taglines.length;
    const label = labels[idx] || ('Tagline ' + (idx + 1));
    mhData.taglines.push({ label, text: '' });
    mhScheduleSave();
    mhRenderEditor();
  };
  window.mhRemoveTagline = function(i) {
    mhData.taglines.splice(i, 1);
    mhScheduleSave();
    mhRenderEditor();
  };

  // Elevator
  window.mhSetElevator = function(key, field, val) {
    if (!mhData.elevator) mhData.elevator = {};
    if (!mhData.elevator[key]) mhData.elevator[key] = { enabled: false, text: '' };
    mhData.elevator[key][field] = val;
    mhScheduleSave();
    if (field === 'enabled') mhRenderEditor();
  };

  // Positioning
  window.mhSetPositioning = function(key, val) {
    if (!mhData.positioning) mhData.positioning = {};
    mhData.positioning[key] = val;
    mhScheduleSave();
  };

  // Pillars
  window.mhSetPillar = function(i, field, val) {
    mhData.pillars[i][field] = val;
    mhScheduleSave();
  };
  window.mhAddPillar = function() {
    if (!mhData.pillars) mhData.pillars = [];
    mhData.pillars.push({ name: '', description: '' });
    mhScheduleSave();
    mhRenderEditor();
  };
  window.mhRemovePillar = function(i) {
    mhData.pillars.splice(i, 1);
    mhScheduleSave();
    mhRenderEditor();
  };

  // Lead with / Avoid chips
  window.mhAddChip = function(field, inputId) {
    const inp = document.getElementById(inputId);
    const val = (inp.value || '').trim();
    if (!val) return;
    if (!mhData[field]) mhData[field] = [];
    mhData[field].push(val);
    inp.value = '';
    mhScheduleSave();
    mhRenderEditor();
  };
  window.mhRemoveChip = function(field, i) {
    mhData[field].splice(i, 1);
    mhScheduleSave();
    mhRenderEditor();
  };

  // Purpose & Vision
  window.mhSetPV = function(key, val) {
    if (!mhData.purpose_vision) mhData.purpose_vision = {};
    mhData.purpose_vision[key] = val;
    mhScheduleSave();
  };

  // Proof assets
  window.mhSetProof = function(i, field, val) {
    mhData.proof_assets[i][field] = val;
    mhScheduleSave();
  };
  window.mhAddProof = function() {
    if (!mhData.proof_assets) mhData.proof_assets = [];
    mhData.proof_assets.push({ type: 'stat', text: '' });
    mhScheduleSave();
    mhRenderEditor();
  };
  window.mhRemoveProof = function(i) {
    mhData.proof_assets.splice(i, 1);
    mhScheduleSave();
    mhRenderEditor();
  };

  /* ══════════════════════════════════════════════════════════════════════════
     UTILITY
     ══════════════════════════════════════════════════════════════════════════ */
  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  /* ══════════════════════════════════════════════════════════════════════════
     BOOT
     ══════════════════════════════════════════════════════════════════════════ */
  mhInit();

})();
</script>

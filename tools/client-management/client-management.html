<div class="cm-container">

  <div class="cm-header">
    <div class="cm-header-row">
      <div>
        <div class="cm-title">Manage Clients</div>
        <div class="cm-subtitle">Manage all client accounts, toggle access, and configure tool permissions.</div>
      </div>
      <div class="cm-header-actions">
        <button class="cm-btn cm-btn-outline" onclick="clientManagement.toggleQuickAdd()" title="Quick Add">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Quick Add
        </button>
        <button class="cm-btn cm-btn-pink" onclick="clientManagement.openWizard()" title="Onboard Client">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Onboard Client
        </button>
      </div>
    </div>
  </div>

  <div class="cm-body">

    <!-- QUICK ADD INLINE -->
    <div class="cm-quick-add" id="cmQuickAdd">
      <input type="text" id="cmQuickName" placeholder="Client name" onkeydown="if(event.key==='Enter') clientManagement.quickAddSave()" autofocus />
      <button class="cm-btn cm-btn-pink" onclick="clientManagement.quickAddSave()">Create</button>
      <button class="cm-btn cm-btn-outline" onclick="clientManagement.toggleQuickAdd()">Cancel</button>
    </div>

    <!-- TABLE VIEW -->
    <div id="cmTableView">
      <div class="cm-table-wrap">
        <table class="cm-table">
          <thead id="cmTableHead"></thead>
          <tbody id="cmTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- MANAGE VIEW (per-client) -->
    <div class="cm-manage" id="cmManageView">
      <div class="cm-manage-header">
        <button class="cm-back-btn" onclick="clientManagement.showTable()" title="Back to list">
          <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="cm-manage-client-name" id="cmManageName"></div>

  <div class="cm-wizard-overlay" id="cmWizardOverlay" onclick="if(event.target===this) clientManagement.closeWizard()">
    <div class="cm-wizard">
      <div class="cm-wizard-header">
        <div class="cm-wizard-title">Onboard New Client</div>
        <button class="cm-wizard-close" onclick="clientManagement.closeWizard()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

<script>
/**
 * Client Management — Admin Tool
 */
window.clientManagement = {

  // Tool definitions for the table header
  tools: [
    { id: 'naming-strategy', label: 'Naming' },
    { id: 'branding-style', label: 'Branding' },
    { id: 'messaging', label: 'Messaging' },
    { id: 'analyst-relations', label: 'Analyst' },
    { id: 'sales-enablement', label: 'Sales' },
    { id: 'roi-calculator', label: 'ROI' },
  ],

  managingClientId: null,

  async init() {
    await this.renderTable();
  },

  // ── Ensure client has status/toolAccess fields (backfill) ──
  ensureFields(client) {
    // Normalise Supabase snake_case → camelCase for template use
    if (client.tool_access && !client.toolAccess) client.toolAccess = client.tool_access;
    if (client.company_details && !client.companyDetails) client.companyDetails = client.company_details;
    if (client.brand_entities && !client.brandEntities) client.brandEntities = client.brand_entities;
    if (client.category_mappings && !client.categoryMappings) client.categoryMappings = client.category_mappings;

    let updated = false;
    if (!client.status) {
      client.status = 'enabled';
      updated = true;
    }
    if (!client.toolAccess) {
      client.toolAccess = {};
      this.tools.forEach(t => { client.toolAccess[t.id] = true; });
      updated = true;
    }
    // Ensure all tools exist in toolAccess
    this.tools.forEach(t => {
      if (client.toolAccess[t.id] === undefined) {
        client.toolAccess[t.id] = true;
        updated = true;
      }
    });
    if (updated && !Storage.isSupabase()) {
      Storage.updateClient(client.id, { status: client.status, toolAccess: client.toolAccess });
    }
    return client;
  },

  // ── SVG helpers ──
  checkSvg: '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
  crossSvg: '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  cogSvg: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',

  esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  },

  // ═══════════════════════════════════════════════════
  // TABLE VIEW
  // ═══════════════════════════════════════════════════
  showTable() {
    document.getElementById('cmTableView').style.display = 'block';
    document.getElementById('cmManageView').classList.remove('active');
    this.managingClientId = null;
    this.renderTable();
  },

  async renderTable() {
    const clients = Storage.isSupabase() ? await Storage.getClientsAsync() : Storage.getClients();

    // Header
    const thead = document.getElementById('cmTableHead');
    thead.innerHTML = `<tr>
      <th>Client</th>
      <th>Status</th>
      ${this.tools.map(t => `<th class="cm-tool-col">${this.esc(t.label)}</th>`).join('')}
      <th class="cm-action-col"></th>
    </tr>`;

    // Body
    const tbody = document.getElementById('cmTableBody');

    if (clients.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${3 + this.tools.length}">
        <div class="cm-empty">
          <div class="cm-empty-icon">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div style="font-weight:600; color:#104060; margin-bottom:0.25rem;">No clients yet</div>
          <div>Clients will appear here once created via the Naming Strategy tool.</div>
        </div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = clients.map(c => {
      this.ensureFields(c);
      const isEnabled = c.status === 'enabled';

      return `<tr>
        <td>
          <div class="cm-client-name">${this.esc(c.name)}</div>
          ${c.vertical ? `<div class="cm-client-vertical">${this.esc(c.vertical)}</div>` : ''}
        </td>
        <td>
          <span class="cm-status ${isEnabled ? 'enabled' : 'disabled'}">
            <span class="cm-status-dot"></span>
            ${isEnabled ? 'Enabled' : 'Disabled'}
          </span>
        </td>
        ${this.tools.map(t => {
          const on = c.toolAccess[t.id] !== false;
          return `<td class="cm-tool-cell">
            <span class="${on ? 'cm-check' : 'cm-cross'}">${on ? this.checkSvg : this.crossSvg}</span>
          </td>`;
        }).join('')}
        <td>
          <button class="cm-manage-btn" onclick="clientManagement.showManage('${c.id}')" title="Manage">
            ${this.cogSvg}
          </button>
        </td>
      </tr>`;
    }).join('');
  },

  // ═══════════════════════════════════════════════════
  // MANAGE VIEW (per-client)
  // ═══════════════════════════════════════════════════
  async showManage(clientId) {
    let client;
    if (Storage.isSupabase()) {
      client = await Storage.getActiveClientAsync.call(Storage);
      // Actually fetch the specific client
      try { client = await Auth.getClientById(clientId); } catch(e) { console.error(e); }
    } else {
      const clients = Storage.getClients();
      client = clients.find(c => c.id === clientId);
    }
    if (!client) return;

    this.ensureFields(client);
    this.managingClientId = clientId;

    document.getElementById('cmTableView').style.display = 'none';
    document.getElementById('cmManageView').classList.add('active');
    document.getElementById('cmManageName').textContent = client.name;

    this.renderManage(client);
    this.loadClientUsers(clientId);
  },

  renderManage(client) {
    const details = client.companyDetails || {};
    const entities = client.brandEntities || [];
    const mappings = client.categoryMappings || { company: [], products: {} };

    let totalItems = 0;
    Object.values(client.items || {}).forEach(arr => { totalItems += arr.length; });

    let totalMappings = (mappings.company || []).length;
    Object.values(mappings.products || {}).forEach(arr => { totalMappings += arr.length; });

    const body = document.getElementById('cmManageBody');
    body.innerHTML = `

      <!-- Stats -->
      <div class="cm-stats">
        <div class="cm-stat">
          <div class="cm-stat-num">${totalItems}</div>
          <div class="cm-stat-label">Names</div>
        </div>
        <div class="cm-stat">
          <div class="cm-stat-num">${entities.length}</div>
          <div class="cm-stat-label">Entities</div>
        </div>
        <div class="cm-stat">
          <div class="cm-stat-num">${totalMappings}</div>
          <div class="cm-stat-label">Category Mappings</div>
        </div>
        <div class="cm-stat">
          <div class="cm-stat-num">${(client.problems || []).length}</div>
          <div class="cm-stat-label">Problems</div>
        </div>
      </div>

      <!-- Account Status -->
      <div class="cm-manage-card">
        <div class="cm-manage-card-title">Account Status</div>
        <div class="cm-manage-card-desc">Enable or disable this client account.</div>
        <div class="cm-toggle-row">
          <div>
            <div class="cm-toggle-label">Account Enabled</div>
            <div class="cm-toggle-sublabel">Disabled accounts are hidden from the client selector</div>
          </div>
          <label class="cm-toggle">
            <input type="checkbox" ${client.status === 'enabled' ? 'checked' : ''} onchange="clientManagement.toggleStatus('${client.id}', this.checked)" />
            <span class="cm-toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- Users -->
      <div class="cm-manage-card">
        <div class="cm-manage-card-title">Users</div>
        <div class="cm-manage-card-desc">People with access to this client account.</div>
        <div id="cmUsersPanel">
          <div style="font-size:0.82rem; color:#9ca3af; font-style:italic;">Loading users…</div>
        </div>
        <div style="margin-top:0.75rem; display:flex; gap:0.5rem; align-items:center;">
          <input type="email" id="cmInviteEmail" placeholder="Email address" class="cm-invite-input" style="flex:1; padding:0.45rem 0.6rem; border:1px solid #e5e7eb; border-radius:6px; font-size:0.82rem; font-family:Inter,sans-serif;" />
          <select id="cmInviteRole" style="padding:0.45rem 0.5rem; border:1px solid #e5e7eb; border-radius:6px; font-size:0.82rem; font-family:Inter,sans-serif;">
            <option value="member">Member</option>
            <option value="admin">Admin</option>
          </select>
          <button onclick="clientManagement.inviteUser('${client.id}')" style="padding:0.45rem 0.75rem; background:#d02090; color:#fff; border:none; border-radius:6px; font-size:0.82rem; font-weight:600; cursor:pointer; font-family:Inter,sans-serif; white-space:nowrap;">Invite</button>
        </div>
      </div>

      <!-- Tool Access -->
      <div class="cm-manage-card">
        <div class="cm-manage-card-title">Tool Access</div>
        <div class="cm-manage-card-desc">Control which tools this client can use.</div>
        ${this.tools.map(t => `
          <div class="cm-toggle-row">
            <div class="cm-toggle-label">${this.esc(t.label)}</div>
            <label class="cm-toggle">
              <input type="checkbox" ${client.toolAccess[t.id] !== false ? 'checked' : ''}
                onchange="clientManagement.toggleTool('${client.id}', '${t.id}', this.checked)" />
              <span class="cm-toggle-slider"></span>
            </label>
          </div>
        `).join('')}
      </div>

      <!-- Company Details (read-only summary) -->
      <div class="cm-manage-card">
        <div class="cm-manage-card-title">Company Details</div>
        <div class="cm-manage-card-desc">Summary of this client's company information. Edit via Client Configuration.</div>
        <div class="cm-info-grid">
          <div>
            <div class="cm-info-label">Company Name</div>
            <div class="cm-info-value ${!client.name ? 'empty' : ''}">${this.esc(client.name) || 'Not set'}</div>
          </div>
          <div>
            <div class="cm-info-label">Vertical</div>
            <div class="cm-info-value ${!client.vertical ? 'empty' : ''}">${this.esc(client.vertical) || 'Not set'}</div>
          </div>
          <div>
            <div class="cm-info-label">Contact Name</div>
            <div class="cm-info-value ${!details.contactName ? 'empty' : ''}">${this.esc(details.contactName) || 'Not set'}</div>
          </div>
          <div>
            <div class="cm-info-label">Contact Email</div>
            <div class="cm-info-value ${!details.contactEmail ? 'empty' : ''}">${this.esc(details.contactEmail) || 'Not set'}</div>
          </div>
          <div>
            <div class="cm-info-label">Contact Phone</div>
            <div class="cm-info-value ${!details.contactPhone ? 'empty' : ''}">${this.esc(details.contactPhone) || 'Not set'}</div>
          </div>
          <div>
            <div class="cm-info-label">Contact Role</div>
            <div class="cm-info-value ${!details.contactRole ? 'empty' : ''}">${this.esc(details.contactRole) || 'Not set'}</div>
          </div>
        </div>
      </div>

      <!-- Brand Entities -->
      <div class="cm-manage-card">
        <div class="cm-manage-card-title">Brand Ontology</div>
        <div class="cm-manage-card-desc">${entities.length} entit${entities.length === 1 ? 'y' : 'ies'} defined.</div>
        ${entities.length > 0 ? `
          <div style="display:flex; flex-wrap:wrap; gap:0.35rem;">
            ${entities.map(e => `
              <span style="display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.55rem; background:rgba(16,64,96,0.06); border-radius:5px; font-size:0.78rem;">
                <span style="font-size:0.6rem; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:#6b7280;">${this.esc(e.type)}</span>
                <span style="font-weight:500; color:#374151;">${this.esc(e.name)}</span>
              </span>
            `).join('')}
          </div>
        ` : '<div style="font-size:0.82rem; color:#9ca3af; font-style:italic;">No entities defined yet.</div>'}
      </div>

      <!-- Timestamps -->
      <div class="cm-manage-card">
        <div class="cm-manage-card-title">Metadata</div>
        <div class="cm-info-grid" style="margin-top:0.5rem;">
          <div>
            <div class="cm-info-label">Created</div>
            <div class="cm-info-value">${client.createdAt ? new Date(client.createdAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : 'Unknown'}</div>
          </div>
          <div>
            <div class="cm-info-label">Last Updated</div>
            <div class="cm-info-value">${client.updatedAt ? new Date(client.updatedAt).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : 'Unknown'}</div>
          </div>
        </div>
      </div>
    `;
  },

  // ── Toggle Handlers ──
  async toggleStatus(clientId, enabled) {
    if (Storage.isSupabase()) {
      await Storage.updateClientAsync(clientId, { status: enabled ? 'enabled' : 'disabled' });
      const client = await Auth.getClientById(clientId);
      if (client) this.renderManage(client);
    } else {
      Storage.updateClient(clientId, { status: enabled ? 'enabled' : 'disabled' });
      const clients = Storage.getClients();
      const client = clients.find(c => c.id === clientId);
      if (client) this.renderManage(client);
    }
  },

  async toggleTool(clientId, toolId, enabled) {
    if (Storage.isSupabase()) {
      const client = await Auth.getClientById(clientId);
      if (!client) return;
      const toolAccess = client.tool_access || client.toolAccess || {};
      toolAccess[toolId] = enabled;
      await Storage.updateClientAsync(clientId, { toolAccess });
    } else {
      const clients = Storage.getClients();
      const client = clients.find(c => c.id === clientId);
      if (!client) return;
      const toolAccess = client.toolAccess || {};
      toolAccess[toolId] = enabled;
      Storage.updateClient(clientId, { toolAccess });
    }
  },

  // ── User Management ──

  async loadClientUsers(clientId) {
    const panel = document.getElementById('cmUsersPanel');
    if (!Storage.isSupabase()) {
      panel.innerHTML = '<div style="font-size:0.82rem; color:#9ca3af; font-style:italic;">User management requires sign-in. Using local storage.</div>';
      return;
    }
    try {
      const users = await Auth.getClientUsers(clientId);
      this.renderUsersPanel(users);
    } catch (err) {
      console.error('loadClientUsers error:', err);
      panel.innerHTML = '<div style="font-size:0.82rem; color:#dc2626;">Failed to load users.</div>';
    }
  },

  renderUsersPanel(users) {
    const panel = document.getElementById('cmUsersPanel');
    if (!users || users.length === 0) {
      panel.innerHTML = '<div style="font-size:0.82rem; color:#9ca3af; font-style:italic;">No users assigned yet.</div>';
      return;
    }

    const roleBadge = (role) => {
      const colours = { owner: '#104060', admin: '#d02090', member: '#059669' };
      const bg = { owner: 'rgba(16,64,96,0.08)', admin: 'rgba(208,32,144,0.08)', member: 'rgba(5,150,105,0.08)' };
      return `<span style="font-size:0.68rem; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; padding:0.15rem 0.45rem; border-radius:4px; background:${bg[role]||bg.member}; color:${colours[role]||colours.member};">${this.esc(role)}</span>`;
    };

    panel.innerHTML = `
      <div style="display:flex; flex-direction:column; gap:0.5rem;">
        ${users.map(u => {
          const p = u.profile || {};
          const name = p.display_name || p.email || 'Unknown';
          const email = p.email || '';
          const accepted = u.accepted_at ? 'Active' : 'Pending';
          const statusColour = u.accepted_at ? '#059669' : '#f59e0b';
          return `<div style="display:flex; align-items:center; justify-content:space-between; padding:0.45rem 0; border-bottom:1px solid #f3f4f6;">
            <div style="display:flex; align-items:center; gap:0.6rem;">
              <div style="width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg, rgba(16,64,96,0.12), rgba(208,32,144,0.12)); display:flex; align-items:center; justify-content:center; font-size:0.72rem; font-weight:700; color:#104060;">${this.esc(name.charAt(0).toUpperCase())}</div>
              <div>
                <div style="font-size:0.85rem; font-weight:500; color:#374151;">${this.esc(name)}</div>
                ${email ? `<div style="font-size:0.72rem; color:#9ca3af;">${this.esc(email)}</div>` : ''}
              </div>
            </div>
            <div style="display:flex; align-items:center; gap:0.5rem;">
              ${roleBadge(u.role)}
              <span style="font-size:0.7rem; color:${statusColour}; font-weight:500;">${accepted}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    `;
  },

  async inviteUser(clientId) {
    const emailInput = document.getElementById('cmInviteEmail');
    const roleSelect = document.getElementById('cmInviteRole');
    const email = (emailInput.value || '').trim();
    const role = roleSelect.value;

    if (!email) {
      emailInput.style.borderColor = '#dc2626';
      return;
    }
    emailInput.style.borderColor = '#e5e7eb';

    if (!Storage.isSupabase()) {
      alert('User invitations require Supabase. Please sign in first.');
      return;
    }

    try {
      await Auth.inviteUser(clientId, email, role);
      emailInput.value = '';
      await this.loadClientUsers(clientId);
    } catch (err) {
      console.error('inviteUser error:', err);
      alert('Invite failed: ' + (err.message || 'Unknown error'));
    }
  },

  // ═══════════════════════════════════════════════════
  // QUICK ADD
  // ═══════════════════════════════════════════════════
  toggleQuickAdd() {
    const el = document.getElementById('cmQuickAdd');
    el.classList.toggle('active');
    if (el.classList.contains('active')) {
      const inp = document.getElementById('cmQuickName');
      inp.value = '';
      inp.focus();
    }
  },

  async quickAddSave() {
    const inp = document.getElementById('cmQuickName');
    const name = (inp.value || '').trim();
    if (!name) { inp.style.borderColor = '#dc2626'; return; }
    inp.style.borderColor = '#e5e7eb';

    const client = await Storage.addClientAsync(name, false);
    if (client) {
      this.toggleQuickAdd();
      await this.renderTable();
    }
  },

  // ═══════════════════════════════════════════════════
  // ONBOARDING WIZARD
  // ═══════════════════════════════════════════════════
  wizardStep: 0,
  wizardData: {},

  wizardSteps: [
    {
      title: 'Company Basics',
      desc: 'Start with the essentials — we can fill in the rest later.',
      fields: [
        { key: 'name', label: 'Company Name', type: 'text', required: true, placeholder: 'e.g. Acme Corp' },
        { key: 'vertical', label: 'Industry / Vertical', type: 'text', placeholder: 'e.g. Cybersecurity, FinTech' },
      ]
    },
    {
      title: 'Primary Contact',
      desc: 'Who is the main point of contact at this company?',
      fields: [
        { key: 'contactName', label: 'Contact Name', type: 'text', placeholder: 'e.g. Jane Smith' },
        { key: 'contactEmail', label: 'Contact Email', type: 'email', placeholder: 'e.g. jane@acme.com' },
        { key: 'contactRole', label: 'Role / Title', type: 'text', placeholder: 'e.g. VP Marketing' },
        { key: 'contactPhone', label: 'Phone', type: 'tel', placeholder: 'Optional' },
      ]
    },
    {
      title: 'Branding',
      desc: 'Upload a logo or paste a URL. You can change this later in Client Configuration.',
      fields: [
        { key: 'logo', label: 'Logo URL', type: 'text', placeholder: 'https://example.com/logo.png (optional)' },
        { key: 'boilerplate', label: 'Company Boilerplate', type: 'textarea', placeholder: 'Short company description for use in reports and assessments…' },
      ]
    },
    {
      title: 'Tool Access',
      desc: 'Choose which tools this client should have access to.',
      fields: 'tools' // special render
    },
  ],

  openWizard() {
    this.wizardStep = 0;
    this.wizardData = {};
    // Default all tools on
    this.tools.forEach(t => { this.wizardData['tool_' + t.id] = true; });
    document.getElementById('cmWizardOverlay').classList.add('active');
    this.renderWizardStep();
  },

  closeWizard() {
    document.getElementById('cmWizardOverlay').classList.remove('active');
    this.wizardData = {};
    this.wizardStep = 0;
  },

  renderWizardStep() {
    const step = this.wizardSteps[this.wizardStep];
    const body = document.getElementById('cmWizardBody');
    const footer = document.getElementById('cmWizardFooter');
    const total = this.wizardSteps.length;

    // Progress bars
    let bars = '<div class="cm-wizard-steps">';
    for (let i = 0; i < total; i++) {
      const cls = i < this.wizardStep ? 'done' : i === this.wizardStep ? 'active' : '';
      bars += `<div class="cm-wizard-step-bar ${cls}"></div>`;
    }
    bars += '</div>';

    let fieldsHtml = '';
    if (step.fields === 'tools') {
      fieldsHtml = this.tools.map(t => {
        const checked = this.wizardData['tool_' + t.id] !== false ? 'checked' : '';
        return `<div class="cm-toggle-row">
          <div class="cm-toggle-label">${this.esc(t.label)}</div>
          <label class="cm-toggle">
            <input type="checkbox" ${checked} onchange="clientManagement.wizardData['tool_${t.id}'] = this.checked" />
            <span class="cm-toggle-slider"></span>
          </label>
        </div>`;
      }).join('');
    } else {
      fieldsHtml = step.fields.map(f => {
        const val = this.wizardData[f.key] || '';
        if (f.type === 'textarea') {
          return `<div class="cm-wizard-field">
            <label>${f.label}</label>
            <textarea id="wiz_${f.key}" placeholder="${f.placeholder || ''}" oninput="clientManagement.wizardData['${f.key}']=this.value">${this.esc(val)}</textarea>
          </div>`;
        }
        return `<div class="cm-wizard-field">
          <label>${f.label}${f.required ? ' *' : ''}</label>
          <input type="${f.type}" id="wiz_${f.key}" value="${this.esc(val)}" placeholder="${f.placeholder || ''}" oninput="clientManagement.wizardData['${f.key}']=this.value" />
        </div>`;
      }).join('');
    }

    body.innerHTML = `
      ${bars}
      <div class="cm-wizard-step-title">Step ${this.wizardStep + 1}: ${step.title}</div>
      <div class="cm-wizard-step-desc">${step.desc}</div>
      ${fieldsHtml}
    `;

    // Footer
    const isFirst = this.wizardStep === 0;
    const isLast = this.wizardStep === total - 1;

    footer.innerHTML = `
      ${isFirst
        ? '<button class="cm-wizard-skip" onclick="clientManagement.closeWizard()">Cancel</button>'
        : '<button class="cm-btn cm-btn-outline" onclick="clientManagement.wizardPrev()">Back</button>'
      }
      <div style="display:flex; gap:0.5rem;">
        ${!isLast ? '<button class="cm-wizard-skip" onclick="clientManagement.wizardNext(true)">Skip</button>' : ''}
        <button class="cm-btn cm-btn-pink" onclick="${isLast ? 'clientManagement.wizardFinish()' : 'clientManagement.wizardNext()'}">${isLast ? 'Create Client' : 'Next'}</button>
      </div>
    `;

    // Auto-focus first input
    setTimeout(() => {
      const first = body.querySelector('input, textarea');
      if (first) first.focus();
    }, 50);
  },

  wizardNext(skip = false) {
    // Validate required on current step
    if (!skip) {
      const step = this.wizardSteps[this.wizardStep];
      if (step.fields !== 'tools') {
        for (const f of step.fields) {
          if (f.required && !(this.wizardData[f.key] || '').trim()) {
            const el = document.getElementById('wiz_' + f.key);
            if (el) { el.style.borderColor = '#dc2626'; el.focus(); }
            return;
          }
        }
      }
    }
    if (this.wizardStep < this.wizardSteps.length - 1) {
      this.wizardStep++;
      this.renderWizardStep();
    }
  },

  wizardPrev() {
    if (this.wizardStep > 0) {
      this.wizardStep--;
      this.renderWizardStep();
    }
  },

  async wizardFinish() {
    const name = (this.wizardData.name || '').trim();
    if (!name) {
      // Jump back to step 0
      this.wizardStep = 0;
      this.renderWizardStep();
      setTimeout(() => {
        const el = document.getElementById('wiz_name');
        if (el) { el.style.borderColor = '#dc2626'; el.focus(); }
      }, 50);
      return;
    }

    // Create the client
    const client = await Storage.addClientAsync(name, false);
    if (!client) {
      alert('Failed to create client. Please try again.');
      return;
    }

    // Apply additional data
    const updates = {};

    if (this.wizardData.vertical) updates.vertical = this.wizardData.vertical;
    if (this.wizardData.logo) updates.logo = this.wizardData.logo;
    if (this.wizardData.boilerplate) updates.boilerplate = this.wizardData.boilerplate;

    // Company details
    const contactFields = ['contactName', 'contactEmail', 'contactRole', 'contactPhone'];
    const companyDetails = {};
    let hasContact = false;
    contactFields.forEach(k => {
      if (this.wizardData[k]) { companyDetails[k] = this.wizardData[k]; hasContact = true; }
    });
    if (hasContact) updates.companyDetails = companyDetails;

    // Tool access
    const toolAccess = {};
    this.tools.forEach(t => {
      toolAccess[t.id] = this.wizardData['tool_' + t.id] !== false;
    });
    updates.toolAccess = toolAccess;

    if (Object.keys(updates).length > 0) {
      if (Storage.isSupabase()) {
        await Storage.updateClientAsync(client.id, updates);
      } else {
        Storage.updateClient(client.id, updates);
      }
    }

    this.closeWizard();
    await this.renderTable();
  },
};
</script>

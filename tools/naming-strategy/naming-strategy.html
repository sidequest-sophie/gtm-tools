<!-- ────────────────────────────────────────────────────────────────────────────
     STYLES
     ──────────────────────────────────────────────────────────────────────────── -->

<style>

    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;

  }

    display: flex;
    align-items: center;
    justify-content: space-between;

    background: var(--white);

    gap: var(--spacing-lg);
    flex-shrink: 0;
  }

    display: flex;
    align-items: center;
    gap: var(--spacing-lg);
  }

  .ns-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--navy);
    margin: 0;
  }

  .ns-client-selector {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    padding: 0.5rem 1rem;
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--navy);
  }

  .ns-client-selector:hover {
    background: var(--gray-200);
    border-color: var(--gray-300);
  }

  .ns-client-selector.empty {
    color: var(--gray-500);
  }

  .ns-settings-btn {
    background: none;
    border: none;
    padding: 0.5rem;
    cursor: pointer;
    color: var(--gray-600);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-md);
    transition: all 0.2s ease;
  }

  .ns-settings-btn:hover {
    background: var(--gray-100);
    color: var(--navy);
  }

  .ns-settings-btn svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }

  /* ── Tab Bar ── */
  .ns-tabs {
    display: flex;
    gap: 2rem;
    border-bottom: 1px solid var(--gray-200);
    padding: 0 var(--spacing-xl);
    background: var(--white);
    flex-shrink: 0;
    overflow-x: auto;
  }

  .ns-tab-btn {
    padding: 1rem 0;
    font-size: 0.9rem;
    font-weight: 500;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;

    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;

  .ns-tab-btn:hover {
    color: var(--navy);
    border-bottom-color: var(--gray-300);
  }

  .ns-tab-btn.active {
    color: var(--pink);
    border-bottom-color: var(--pink);
  }

  .ns-content {
    flex: 1;
    overflow-y: auto;
    padding: var(--spacing-xl);
  }

  .ns-tab-content {
    display: none;
    animation: fadeIn 0.2s ease;
  }

  .ns-tab-content.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }

  /* ────────────────────────────────────────────────────────────────────────────
     TAB 1: EXAMPLES
     ──────────────────────────────────────────────────────────────────────────── */

  .ns-examples {
    max-width: 100%;
  }

  .ns-examples-header {
    margin-bottom: var(--spacing-xl);
  }

  .ns-filter-bar {
    display: flex;
    gap: var(--spacing-md);
    margin-bottom: var(--spacing-lg);
    flex-wrap: wrap;

  .ns-filter-btn {

    border-radius: var(--radius-md);

    font-weight: 500;

    margin-bottom: var(--spacing-lg);

    gap: var(--spacing-md);
    margin-bottom: var(--spacing-xl);

    border-radius: var(--radius-md);
    background: var(--gray-50);

    flex-direction: column;
    gap: var(--spacing-sm);

  .ns-cell-subtitle {

    gap: var(--spacing-xs);

  .ns-chip {

  }

  /* ────────────────────────────────────────────────────────────────────────────
     TAB 2: NAMING AUDIT

  /* ────────────────────────────────────────────────────────────────────────────

<script>
// ────────────────────────────────────────────────────────────────────────────
// NAMING STRATEGY TOOL - MAIN MODULE
// ────────────────────────────────────────────────────────────────────────────

window.namingStrategy = {
  // State
  currentFilter: 'all',
  settingsOpen: false,
  editingCategoryId: null,

  // Example brand data for Tab 1

      ]
    },
    suggestive_jargon: {
      subtitle: 'Implies benefits',
      brands: [
        { name: 'Cloudflare', type: 'products' },
        { name: 'Datadog', type: 'products' },
        { name: 'Splunk', type: 'products' }
      ]
    },
    suggestive_real: {
      subtitle: 'Real + suggestive',
      brands: [
        { name: 'Safari', type: 'products' },
        { name: 'Visa', type: 'companies' },
        { name: 'Uber', type: 'companies' }
      ]
    },
    suggestive_compound: {
      subtitle: 'Compound + meaning',
      brands: [
        { name: 'YouTube', type: 'products' },
        { name: 'LinkedIn', type: 'companies' },
        { name: 'MacBook', type: 'features' }
      ]
    },
    suggestive_coined: {
      subtitle: 'Suggests benefit',
      brands: [
        { name: 'Spotify', type: 'companies' },
        { name: 'Netflix', type: 'companies' },
        { name: 'Pinterest', type: 'companies' }
      ]
    },
    descriptive_jargon: {
      subtitle: 'Tells you what it is',
      brands: [
        { name: 'Salesforce', type: 'products' },
        { name: 'ServiceNow', type: 'products' },
        { name: 'Workday', type: 'products' }
      ]
    },
    descriptive_real: {
      subtitle: 'Simple descriptions',
      brands: [
        { name: 'Word', type: 'features' },
        { name: 'Teams', type: 'features' },
        { name: 'Outlook', type: 'features' }
      ]
    },
    descriptive_compound: {
      subtitle: 'Describes + real word',
      brands: [
        { name: 'PayPal', type: 'companies' },
        { name: 'PowerPoint', type: 'features' },
        { name: 'FaceTime', type: 'features' }
      ]
    },
    descriptive_coined: {
      subtitle: 'Descriptive + new',
      brands: [
        { name: 'Accenture', type: 'companies' },
        { name: 'Verizon', type: 'companies' },
        { name: 'Cognizant', type: 'companies' }
      ]
    }
  },

  // Initialize the tool
  init() {
    console.log('Naming Strategy Tool initialized');
    this.setupEventListeners();
    this.renderAll();
  },

  // Setup all event listeners
  setupEventListeners() {
    // Tab navigation
    document.querySelectorAll('.ns-tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => this.switchTab(e.target.dataset.tab));
    });

    // Filter buttons (Examples tab)
    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', (e) => this.setFilter(e.target.dataset.filter));
    });

    // Settings panel
    document.getElementById('nsSettingsToggle').addEventListener('click', () => this.toggleSettings());
    document.getElementById('nsSettingsClose').addEventListener('click', () => this.toggleSettings());
    document.getElementById('nsSettingsOverlay').addEventListener('click', () => this.toggleSettings());

    // Client selector
    document.getElementById('nsClientSelector').addEventListener('click', () => this.toggleSettings());

    // Client management
    document.getElementById('nsNewClientBtn').addEventListener('click', () => this.addNewClient());
    document.getElementById('nsNewClientInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') this.addNewClient();
    });

    // Category management
    document.getElementById('nsNewCategoryBtn').addEventListener('click', () => this.addNewCategory());
    document.getElementById('nsNewCategoryInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') this.addNewCategory();
    });
  },

  // ────────────────────────────────────────────────────────────────────────────
  // TAB 1: EXAMPLES
  // ────────────────────────────────────────────────────────────────────────────

  renderExamplesTab() {
    const matrix = document.getElementById('nsExamplesMatrix');
    matrix.innerHTML = '';

    // Column headers
    const columnHeaders = ['', 'Industry Jargon', 'Real Word', 'Compound', 'Coined'];
    const rowHeaders = ['Abstract', 'Suggestive', 'Descriptive'];
    const cellKeys = [
      ['', 'abstract_jargon', 'abstract_real', 'abstract_compound', 'abstract_coined'],
      ['', 'suggestive_jargon', 'suggestive_real', 'suggestive_compound', 'suggestive_coined'],
      ['', 'descriptive_jargon', 'descriptive_real', 'descriptive_compound', 'descriptive_coined']
    ];

    // Create headers
    columnHeaders.forEach((header, idx) => {
      const headerEl = document.createElement('div');
      headerEl.className = idx === 0 ? 'ns-cell-row-header' : 'ns-cell-header';
      headerEl.textContent = header;
      matrix.appendChild(headerEl);
    });

    // Create cells
    rowHeaders.forEach((rowHeader, rowIdx) => {
      // Row header
      const rowHeaderEl = document.createElement('div');
      rowHeaderEl.className = 'ns-cell-row-header';
      rowHeaderEl.textContent = rowHeader;
      matrix.appendChild(rowHeaderEl);

      // Cells
      for (let colIdx = 1; colIdx < columnHeaders.length; colIdx++) {
        const cellKey = cellKeys[rowIdx][colIdx];
        const cellData = this.examplesData[cellKey];
        const cell = document.createElement('div');
        cell.className = 'ns-cell';

        let html = `<div class="ns-cell-subtitle">${cellData.subtitle}</div><div class="ns-cell-chips">`;

        cellData.brands.forEach(brand => {
          if (this.currentFilter === 'all' || this.currentFilter === brand.type) {
            html += `<div class="ns-chip ${brand.type}">${brand.name}</div>`;
          }
        });

        html += '</div>';
        cell.innerHTML = html;
        matrix.appendChild(cell);
      }
    });

    this.updateExamplesStats();
  },

  updateExamplesStats() {
    let count = 0;
    Object.values(this.examplesData).forEach(cell => {
      if (this.currentFilter === 'all') {
        count += cell.brands.length;
      } else {
        count += cell.brands.filter(b => b.type === this.currentFilter).length;
      }
    });
    document.getElementById('nsStatsCount').textContent = count;
  },

  setFilter(filter) {
    this.currentFilter = filter;
    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === filter);
    });
    this.renderExamplesTab();
  },

  // ────────────────────────────────────────────────────────────────────────────
  // TAB 2: NAMING AUDIT
  // ────────────────────────────────────────────────────────────────────────────

  renderAuditTab() {
    const client = Storage.getActiveClient();
    const container = document.getElementById('nsAuditContainer');

    if (!client) {
      container.innerHTML = '<div class="ns-empty-state"><div class="ns-empty-state-icon">📋</div><div class="ns-empty-state-title">No Client Selected</div><div class="ns-empty-state-text">Create or select a client in Settings to start your naming audit.</div></div>';
      return;
    }

    let html = '<div class="ns-audit-sections">';

    client.categories.forEach((category, catIdx) => {
      const items = client.items[category] || [];
      const colorClass = catIdx % 6;

      html += `
        <div class="ns-category-section">
          <div class="ns-category-header">
            <div class="ns-category-title">${category}</div>
            <div class="ns-category-badge">${items.length}</div>
          </div>
          <textarea class="ns-textarea" placeholder="Paste your client's ${category} names here (comma or newline separated)" data-category="${category}"></textarea>
          <button class="ns-add-btn" data-add-category="${category}">Add</button>
          <div class="ns-lozenges" id="lozenges-${category}">`;

      items.forEach(item => {
        html += `<div class="ns-lozenge" data-category="${colorClass}" data-id="${item.id}" data-item="${item.name}">
          ${item.name}
          <button class="ns-lozenge-delete" data-delete="${item.id}">×</button>
        </div>`;
      });

      html += `</div></div>`;
    });

    html += '</div>';
    container.innerHTML = html;

    // Add event listeners
    container.querySelectorAll('[data-add-category]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const category = e.target.dataset.addCategory;
        const textarea = e.target.previousElementSibling;
        this.addAuditItems(category, textarea.value);
        textarea.value = '';
      });
    });

    container.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const itemId = e.target.dataset.delete;
        const lozenge = e.target.closest('.ns-lozenge');
        const category = lozenge.closest('.ns-category-section').querySelector('[data-category]').dataset.category;
        Storage.deleteItemFromCategory(category, itemId);
        this.renderAuditTab();
      });
    });
  },

  addAuditItems(category, input) {
    if (!input.trim()) return;

    const client = Storage.getActiveClient();
    if (!client) return;

    // Parse comma or newline separated items
    const items = input
      .split(/[,\n]/)
      .map(item => item.trim())
      .filter(item => item.length > 0);

    items.forEach(item => {
      Storage.addItemToCategory(category, item, '');
    });

    this.renderAuditTab();
    this.renderMappingTab();
    this.renderProblemsTab();
  },

  // ────────────────────────────────────────────────────────────────────────────
  // TAB 3: CONCEPT MAPPING
  // ────────────────────────────────────────────────────────────────────────────

  renderMappingTab() {
    const client = Storage.getActiveClient();
    const container = document.getElementById('nsMappingContainer');

    if (!client) {
      container.innerHTML = '<div class="ns-empty-state"><div class="ns-empty-state-icon">🗺️</div><div class="ns-empty-state-title">No Client Selected</div><div class="ns-empty-state-text">Create or select a client to map naming concepts.</div></div>';
      return;
    }

    // Count total items and mapped items
    let totalItems = 0;
    let mappedItems = 0;
    Object.values(client.items).forEach(categoryItems => {
      categoryItems.forEach(item => {
        totalItems++;
        if (item.cell) mappedItems++;
      });
    });

    let html = '';

    // Warning banner if too clustered
    if (totalItems > 0 && mappedItems > 0) {
      const cellCounts = {};
      Object.values(client.items).forEach(categoryItems => {
        categoryItems.forEach(item => {
          if (item.cell) {
            cellCounts[item.cell] = (cellCounts[item.cell] || 0) + 1;
          }
        });
      });
      const cellArray = Object.values(cellCounts).sort((a, b) => b - a);
      const topTwo = cellArray.slice(0, 2).reduce((a, b) => a + b, 0);
      const clusteredPercent = Math.round((topTwo / mappedItems) * 100);

      if (clusteredPercent > 50) {
        html += `<div class="ns-warning-banner"><div class="ns-warning-icon">⚠️</div><div>${clusteredPercent}% of items are in just 2 cells. Consider diversifying naming strategy.</div></div>`;
      }
    }

    // Grid
    const columnHeaders = ['', 'Industry Jargon', 'Real Word', 'Compound', 'Coined'];
    const rowHeaders = ['Abstract', 'Suggestive', 'Descriptive'];
    const cellKeys = [
      ['', 'abstract_jargon', 'abstract_real', 'abstract_compound', 'abstract_coined'],
      ['', 'suggestive_jargon', 'suggestive_real', 'suggestive_compound', 'suggestive_coined'],
      ['', 'descriptive_jargon', 'descriptive_real', 'descriptive_compound', 'descriptive_coined']
    ];

    html += '<div class="ns-mapping-grid">';

    // Headers
    columnHeaders.forEach((header, idx) => {
      html += `<div class="${idx === 0 ? 'ns-cell-row-header' : 'ns-cell-header'}">${header}</div>`;
    });

    // Cells
    rowHeaders.forEach((rowHeader, rowIdx) => {
      html += `<div class="ns-cell-row-header">${rowHeader}</div>`;

      for (let colIdx = 1; colIdx < columnHeaders.length; colIdx++) {
        const cellKey = cellKeys[rowIdx][colIdx];
        const itemsInCell = [];

        Object.values(client.items).forEach(categoryItems => {
          categoryItems.forEach(item => {
            if (item.cell === cellKey) {
              itemsInCell.push(item);
            }
          });
        });

        html += `<div class="ns-mapping-cell" data-cell="${cellKey}"><div class="ns-mapping-cell-chips">`;
        itemsInCell.forEach((item, idx) => {
          const colorClass = client.categories.indexOf(this.getItemCategory(client, item.id)) % 6;
          html += `<div class="ns-mapping-chip" data-category="${colorClass}">${item.name}<button class="ns-mapping-chip-delete" data-unmap="${item.id}">×</button></div>`;
        });
        html += '</div></div>';
      }
    });

    html += '</div>';

    // Unmapped items
    const unmappedItems = [];
    Object.values(client.items).forEach(categoryItems => {
      categoryItems.forEach(item => {
        if (!item.cell) {
          unmappedItems.push(item);
        }
      });
    });

    if (unmappedItems.length > 0) {
      html += '<div class="ns-unmapped-panel"><div class="ns-unmapped-title">Unmapped Items (' + unmappedItems.length + ')</div><div class="ns-unmapped-items">';
      unmappedItems.forEach(item => {
        const colorClass = client.categories.indexOf(this.getItemCategory(client, item.id)) % 6;
        html += `<div class="ns-unmapped-item" data-category="${colorClass}" data-id="${item.id}">${item.name}</div>`;
      });
      html += '</div></div>';
    }

    // Stats
    if (totalItems > 0) {
      html += '<div class="ns-stats-grid">';
      html += `<div class="ns-stat-card"><div class="ns-stat-value">${totalItems}</div><div class="ns-stat-label">Total Items</div></div>`;
      html += `<div class="ns-stat-card"><div class="ns-stat-value">${mappedItems}</div><div class="ns-stat-label">Mapped</div></div>`;
      html += `<div class="ns-stat-card"><div class="ns-stat-value">${totalItems - mappedItems}</div><div class="ns-stat-label">Unmapped</div></div>`;
      html += '</div>';
    }

    container.innerHTML = html;

    // Event listeners
    container.querySelectorAll('.ns-mapping-cell').forEach(cell => {
      cell.addEventListener('click', (e) => {
        if (e.target.closest('.ns-mapping-chip-delete')) {
          const itemId = e.target.closest('.ns-mapping-chip-delete').dataset.unmap;
          this.unmapItem(itemId);
        }
      });
    });

    container.querySelectorAll('.ns-unmapped-item').forEach(item => {
      item.addEventListener('click', (e) => {
        const itemId = e.currentTarget.dataset.id;
        this.showCellSelector(itemId);
      });
    });
  },

  showCellSelector(itemId) {
    const client = Storage.getActiveClient();
    const items = [];
    Object.values(client.items).forEach(categoryItems => {
      categoryItems.forEach(item => {
        if (item.id === itemId) items.push(item);
      });
    });
    const item = items[0];
    if (!item) return;

    const cells = [
      { key: 'abstract_jargon', label: 'Abstract + Industry Jargon' },
      { key: 'abstract_real', label: 'Abstract + Real Word' },
      { key: 'abstract_compound', label: 'Abstract + Compound' },
      { key: 'abstract_coined', label: 'Abstract + Coined' },
      { key: 'suggestive_jargon', label: 'Suggestive + Industry Jargon' },
      { key: 'suggestive_real', label: 'Suggestive + Real Word' },
      { key: 'suggestive_compound', label: 'Suggestive + Compound' },
      { key: 'suggestive_coined', label: 'Suggestive + Coined' },
      { key: 'descriptive_jargon', label: 'Descriptive + Industry Jargon' },
      { key: 'descriptive_real', label: 'Descriptive + Real Word' },
      { key: 'descriptive_compound', label: 'Descriptive + Compound' },
      { key: 'descriptive_coined', label: 'Descriptive + Coined' }
    ];

    let html = '<div class="ns-modal-header"><div class="ns-modal-title">Assign to Cell</div></div><div class="ns-modal-body">';
    html += '<div style="display: grid; gap: 0.5rem;">';
    cells.forEach(cell => {
      html += `<button class="ns-modal-btn ns-modal-btn-secondary" data-assign="${cell.key}">${cell.label}</button>`;
    });
    html += '</div></div>';

    const modal = document.getElementById('nsModal');
    modal.innerHTML = html;
    document.getElementById('nsModalOverlay').classList.add('open');

    modal.querySelectorAll('[data-assign]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        this.assignItemToCell(itemId, e.target.dataset.assign);
        document.getElementById('nsModalOverlay').classList.remove('open');
      });
    });
  },

  assignItemToCell(itemId, cellKey) {
    const client = Storage.getActiveClient();
    let found = false;
    Object.values(client.items).forEach(categoryItems => {
      categoryItems.forEach(item => {
        if (item.id === itemId) {
          item.cell = cellKey;
          found = true;
        }
      });
    });
    if (found) {
      Storage.updateClient(client.id, client);
      this.renderMappingTab();
      this.renderProblemsTab();
    }
  },

  unmapItem(itemId) {
    const client = Storage.getActiveClient();
    Object.values(client.items).forEach(categoryItems => {
      categoryItems.forEach(item => {
        if (item.id === itemId) {
          item.cell = '';
        }
      });
    });
    Storage.updateClient(client.id, client);
    this.renderMappingTab();
    this.renderProblemsTab();
  },

  getItemCategory(client, itemId) {
    for (const category of client.categories) {
      const item = client.items[category].find(i => i.id === itemId);
      if (item) return category;
    }
    return '';
  },

  // ────────────────────────────────────────────────────────────────────────────
  // TAB 4: PROBLEMS
  // ────────────────────────────────────────────────────────────────────────────

  renderProblemsTab() {
    const client = Storage.getActiveClient();
    const container = document.getElementById('nsProblemsContainer');

    if (!client) {
      container.innerHTML = '<div class="ns-empty-state"><div class="ns-empty-state-icon">⚠️</div><div class="ns-empty-state-title">No Client Selected</div></div>';
      return;
    }

    const problems = this.detectProblems(client);
    const userProblems = client.problems || [];

    let html = `<div class="ns-problems-header">
      <div class="ns-problems-summary">${problems.length + userProblems.length} problems found</div>
      <button class="ns-add-problem-btn" id="nsAddProblemBtn">+ Add Problem</button>
    </div>`;

    html += '<div class="ns-problems-list">';

    // Auto-detected problems
    problems.forEach(problem => {
      html += this.renderProblemCard(problem);
    });

    // User problems
    userProblems.forEach(problem => {
      html += this.renderProblemCard(problem, true);
    });

    if (problems.length === 0 && userProblems.length === 0) {
      html += '<div class="ns-empty-state"><div class="ns-empty-state-icon">✓</div><div class="ns-empty-state-title">No problems detected</div></div>';
    }

    html += '</div>';
    container.innerHTML = html;

    document.getElementById('nsAddProblemBtn')?.addEventListener('click', () => this.showAddProblemForm());
  },

  detectProblems(client) {
    const problems = [];

    // Count total and mapped items
    let totalItems = 0;
    let mappedItems = 0;
    const allItems = [];

    Object.values(client.items).forEach(categoryItems => {
      categoryItems.forEach(item => {
        totalItems++;
        allItems.push(item);
        if (item.cell) mappedItems++;
      });
    });

    // Problem 1: Unmapped items
    if (mappedItems < totalItems) {
      problems.push({
        title: 'Unmapped Items',
        description: `${totalItems - mappedItems} item(s) have not been assigned to a naming cell.`,
        severity: 'medium',
        items: allItems.filter(i => !i.cell).map(i => i.name)
      });
    }

    // Problem 2: Distribution (too clustered)
    if (mappedItems > 0) {
      const cellCounts = {};
      allItems.forEach(item => {
        if (item.cell) {
          cellCounts[item.cell] = (cellCounts[item.cell] || 0) + 1;
        }
      });
      const cellArray = Object.values(cellCounts).sort((a, b) => b - a);
      const topTwo = cellArray.slice(0, 2).reduce((a, b) => a + b, 0);
      const clusteredPercent = Math.round((topTwo / mappedItems) * 100);

      if (clusteredPercent > 50) {
        problems.push({
          title: 'Clustering Risk',
          description: `${clusteredPercent}% of mapped items are in just 2 cells. Diversify your naming strategy.`,
          severity: 'high',
          items: []
        });
      }
    }

    // Problem 3: Overloaded words (if we can detect them)
    const nameFreq = {};
    allItems.forEach(item => {
      const words = item.name.toLowerCase().split(/[\s\-_]+/);
      words.forEach(word => {
        if (word.length > 3) {
          nameFreq[word] = (nameFreq[word] || 0) + 1;
        }
      });
    });

    const overloadedWords = Object.entries(nameFreq).filter(([word, count]) => count > 2);
    if (overloadedWords.length > 0) {
      problems.push({
        title: 'Repeated Words',
        description: `The word "${overloadedWords[0][0]}" appears ${overloadedWords[0][1]} times across items.`,
        severity: 'low',
        items: allItems.filter(i => i.name.toLowerCase().includes(overloadedWords[0][0])).map(i => i.name)
      });
    }

    return problems;
  },

  renderProblemCard(problem, isUser = false) {
    const severityColor = {
      high: 'badge-high',
      medium: 'badge-medium',
      low: 'badge-low'
    };

    let html = `<div class="ns-problem-card">
      <div class="ns-problem-header">
        <div class="ns-problem-title">${problem.title}</div>
        <div class="ns-problem-severity ${severityColor[problem.severity] || 'badge-low'}">${problem.severity}</div>
      </div>
      <div class="ns-problem-description">${problem.description}</div>`;

    if (problem.items && problem.items.length > 0) {
      html += `<div class="ns-problem-items"><strong>Affected items:</strong> ${problem.items.slice(0, 3).join(', ')}${problem.items.length > 3 ? '...' : ''}</div>`;
    }

    if (isUser) {
      html += `<div style="margin-top: 1rem;"><button class="ns-modal-btn-secondary" style="padding: 0.375rem 0.75rem; font-size: 0.8rem;" onclick="window.namingStrategy.deleteProblem('${problem.id}')">Delete</button></div>`;
    }

    html += '</div>';
    return html;
  },

  showAddProblemForm() {
    const modal = document.getElementById('nsModal');
    modal.innerHTML = `
      <div class="ns-modal-header"><div class="ns-modal-title">Add Problem</div></div>
      <div class="ns-modal-body">
        <input type="text" id="nsProblemTitle" placeholder="Problem title" style="width: 100%; padding: 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px; margin-bottom: 1rem; font-family: inherit;" />
        <textarea id="nsProblemDesc" placeholder="Describe the problem" style="width: 100%; padding: 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px; margin-bottom: 1rem; font-family: inherit; min-height: 80px; resize: vertical;"></textarea>
        <select id="nsProblemSeverity" style="width: 100%; padding: 0.5rem; border: 1px solid var(--gray-300); border-radius: 4px; font-family: inherit;">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="ns-modal-footer">
        <button class="ns-modal-btn ns-modal-btn-secondary" onclick="document.getElementById('nsModalOverlay').classList.remove('open')">Cancel</button>
        <button class="ns-modal-btn ns-modal-btn-primary" onclick="window.namingStrategy.saveProblem()">Save</button>
      </div>
    `;
    document.getElementById('nsModalOverlay').classList.add('open');
  },

  saveProblem() {
    const title = document.getElementById('nsProblemTitle').value;
    const desc = document.getElementById('nsProblemDesc').value;
    const severity = document.getElementById('nsProblemSeverity').value;

    if (!title || !desc) return;

    const client = Storage.getActiveClient();
    const problem = {
      id: Storage.uuid(),
      title: title,
      description: desc,
      severity: severity,
      items: []
    };

    if (!client.problems) client.problems = [];
    client.problems.push(problem);
    Storage.updateClient(client.id, client);

    document.getElementById('nsModalOverlay').classList.remove('open');
    this.renderProblemsTab();
  },

  deleteProblem(problemId) {
    const client = Storage.getActiveClient();
    client.problems = client.problems.filter(p => p.id !== problemId);
    Storage.updateClient(client.id, client);
    this.renderProblemsTab();
  },

  // ────────────────────────────────────────────────────────────────────────────
  // SETTINGS PANEL
  // ────────────────────────────────────────────────────────────────────────────

  toggleSettings() {
    this.settingsOpen = !this.settingsOpen;
    document.getElementById('nsSettingsPanel').classList.toggle('open');
    document.getElementById('nsSettingsOverlay').classList.toggle('open');
    if (this.settingsOpen) {
      this.renderSettings();
    }
  },

  renderSettings() {
    this.renderClientsList();
    this.renderCategoriesList();
  },

  renderClientsList() {
    const clients = Storage.getClients();
    const activeId = Storage.getActiveClientId();
    const list = document.getElementById('nsClientsList');

    list.innerHTML = clients.map(client => `
      <div class="ns-client-item ${client.id === activeId ? 'active' : ''}" data-client-id="${client.id}">
        <span class="ns-client-item-name">${client.name}</span>
        <div class="ns-client-item-actions">
          <button class="ns-client-item-action" data-rename="${client.id}" title="Rename">
            <svg viewBox="0 0 24 24"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
          </button>
          <button class="ns-client-item-action" data-delete="${client.id}" title="Delete">
            <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h16zM10 11v6M14 11v6"/></svg>
          </button>
        </div>
      </div>
    `).join('');

    list.querySelectorAll('.ns-client-item').forEach(item => {
      item.addEventListener('click', (e) => {
        if (e.target.closest('[data-rename]') || e.target.closest('[data-delete]')) return;
        const clientId = item.dataset.clientId;
        Storage.setActiveClientId(clientId);
        this.renderAll();
      });
    });

    list.querySelectorAll('[data-rename]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const clientId = btn.dataset.rename;
        const client = Storage.getClients().find(c => c.id === clientId);
        if (!client) return;
        const newName = prompt('Rename client:', client.name);
        if (newName) {
          Storage.updateClient(clientId, { name: newName });
          this.renderClientsList();
          this.renderAll();
        }
      });
    });

    list.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const clientId = btn.dataset.delete;
        const client = Storage.getClients().find(c => c.id === clientId);
        if (!client) return;
        if (confirm(`Delete client "${client.name}"? This cannot be undone.`)) {
          Storage.deleteClient(clientId);
          this.renderAll();
          this.renderClientsList();
        }
      });
    });
  },

  addNewClient() {
    const input = document.getElementById('nsNewClientInput');
    const name = input.value.trim();
    if (!name) return;

    Storage.addClient(name, true);
    input.value = '';
    this.renderAll();
    this.renderClientsList();
  },

  renderCategoriesList() {
    const client = Storage.getActiveClient();
    if (!client) {
      document.getElementById('nsCategoriesList').innerHTML = '<div style="color: var(--gray-500); font-size: 0.9rem;">No client selected</div>';
      return;
    }

    const list = document.getElementById('nsCategoriesList');
    list.innerHTML = client.categories.map((cat, idx) => `
      <div class="ns-category-item">
        <div class="ns-category-item-drag">⋮⋮</div>
        <div class="ns-category-item-name">${cat}</div>
        <div class="ns-category-item-actions">
          <button class="ns-category-item-action" data-edit="${idx}" title="Edit">
            <svg viewBox="0 0 24 24"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
          </button>
          <button class="ns-category-item-action" data-delete="${idx}" title="Delete">
            <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h16zM10 11v6M14 11v6"/></svg>
          </button>
        </div>
      </div>
    `).join('');

    list.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.edit);
        const oldName = client.categories[idx];
        const newName = prompt('Rename category:', oldName);
        if (newName && newName !== oldName) {
          client.categories[idx] = newName;
          if (client.items[oldName]) {
            client.items[newName] = client.items[oldName];
            delete client.items[oldName];
          }
          Storage.updateClient(client.id, client);
          this.renderAll();
          this.renderCategoriesList();
        }
      });
    });

    list.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.delete);
        const catName = client.categories[idx];
        const itemCount = (client.items[catName] || []).length;
        if (itemCount > 0) {
          if (!confirm(`This category has ${itemCount} item(s). Delete anyway?`)) return;
        }
        client.categories.splice(idx, 1);
        delete client.items[catName];
        Storage.updateClient(client.id, client);
        this.renderAll();
        this.renderCategoriesList();
      });
    });
  },

  addNewCategory() {
    const input = document.getElementById('nsNewCategoryInput');
    const name = input.value.trim();
    if (!name) return;

    const client = Storage.getActiveClient();
    if (!client) return;

    if (client.categories.includes(name)) {
      alert('Category already exists');
      return;
    }

    client.categories.push(name);
    client.items[name] = [];
    Storage.updateClient(client.id, client);
    input.value = '';
    this.renderAll();
    this.renderCategoriesList();
  },

  // ────────────────────────────────────────────────────────────────────────────
  // MAIN RENDERING & TAB SWITCHING
  // ────────────────────────────────────────────────────────────────────────────

  switchTab(tabName) {
    document.querySelectorAll('.ns-tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tabName);
    });

    document.querySelectorAll('.ns-tab-content').forEach(content => {
      content.classList.remove('active');
    });

    const tabMap = {
      examples: 'nsTabExamples',
      audit: 'nsTabAudit',
      mapping: 'nsTabMapping',
      problems: 'nsTabProblems'
    };

    document.getElementById(tabMap[tabName])?.classList.add('active');
  },

  renderAll() {
    this.updateClientSelector();
    this.renderExamplesTab();
    this.renderAuditTab();
    this.renderMappingTab();
    this.renderProblemsTab();
  },

  updateClientSelector() {
    const client = Storage.getActiveClient();
    const selector = document.getElementById('nsClientSelector');
    const name = document.getElementById('nsClientName');

    if (client) {
      name.textContent = client.name;
      selector.classList.remove('empty');
    } else {
      name.textContent = 'No Client Selected';
      selector.classList.add('empty');
    }
  }
};

</script>

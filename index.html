<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTM Tools — Category Leaders</title>
  <meta name="description" content="Powerful GTM tools from Category Leaders. Coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy:   #1d3d5c;
      --pink:   #e0177e;
      --light:  #f4f7fa;
      --white:  #ffffff;
      --muted:  #6b8099;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--light);
      color: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ── Background subtle pattern ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(29,61,92,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 90% 90%, rgba(224,23,126,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--white);
      border-radius: 20px;
      box-shadow:
        0 4px 6px -1px rgba(0,0,0,0.04),
        0 20px 60px -10px rgba(29,61,92,0.12);
      padding: 4rem 3.5rem;
      max-width: 620px;
      width: 100%;
      text-align: center;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 2.5rem;
    }

    .logo-wrap img {
      height: 56px;
      width: auto;
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 3px;
      background: var(--pink);
      border-radius: 999px;
      margin: 0 auto 2rem;
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(224,23,126,0.08);
      color: var(--pink);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--pink);
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── Heading ── */
    h1 {
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 800;
      line-height: 1.15;
      color: var(--navy);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--pink);
    }

    /* ── Subheading ── */
    p.sub {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 440px;
      margin: 0 auto 2.5rem;
    }

    /* ── Features preview ── */
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .feature-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--light);
      border: 1px solid rgba(29,61,92,0.1);
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--navy);
    }

    .feature-pill svg {
      flex-shrink: 0;
      color: var(--pink);
    }

    /* ── Notify form ── */
    .notify-form {
      display: flex;
      gap: 0.6rem;
      max-width: 400px;
      margin: 0 auto 2rem;
    }

    .notify-form input[type="email"] {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1.5px solid rgba(29,61,92,0.15);
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--navy);
      outline: none;
      transition: border-color 0.2s;
    }

    .notify-form input[type="email"]:focus {
      border-color: var(--pink);
    }

    .notify-form input[type="email"]::placeholder {
      color: var(--muted);
    }

    .notify-form button {
      padding: 0.75rem 1.4rem;
      background: var(--pink);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .notify-form button:hover {
      background: #c4136d;
      transform: translateY(-1px);
    }

    .notify-form button:active {
      transform: translateY(0);
    }

    /* ── Footer note ── */
    .footer-note {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .footer-note a {
      color: var(--navy);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-note a:hover {
      color: var(--pink);
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .card {
        padding: 2.5rem 1.75rem;
      }

      .notify-form {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="logo-wrap">
      <img src="logo.png" alt="Category Leaders" />
    </div>

    <div class="divider"></div>

    <div class="badge">Coming Soon</div>

    <h1>GTM <span>Tools</span></h1>

    <p class="sub">
      Powerful, practical tools built for go-to-market teams.
      We're putting the finishing touches on something great.
    </p>

    <div class="features">
      <div class="feature-pill">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
        </svg>
        Messaging frameworks
      </div>
      <div class="feature-pill">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4l3 3"/>
        </svg>
        ICP builder
      </div>
      <div class="feature-pill">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        Competitive positioning
      </div>
      <div class="feature-pill">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Sales enablement
      </div>
    </div>

    <form class="notify-form" onsubmit="handleSubmit(event)">
      <input type="email" placeholder="your@email.com" required />
      <button type="submit">Notify me</button>
    </form>

    <p class="footer-note">
      No spam. Just a heads-up when we launch. &nbsp;·&nbsp;
      <a href="https://categoryleaders.co.uk">categoryleaders.co.uk</a>
    </p>

  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = '✓ You\'re on the list!';
      btn.style.background = '#1d3d5c';
      btn.disabled = true;
      e.target.querySelector('input').disabled = true;
    }
  </script>

</body>
</html>
